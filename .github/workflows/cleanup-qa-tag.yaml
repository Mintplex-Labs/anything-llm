# Cleans up the GHCR image tag when the PR is closed or the "PR: Ready for QA" label is removed.
name: Cleanup QA GHCR Image

on:
  pull_request:
    types: [closed, unlabeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to clean up (e.g., 123)'
        required: true

jobs:
  cleanup-manual:
    name: Delete QA GHCR image tag (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      packages: write
    steps:
      - name: Delete PR tag from GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "Looking for tag: pr-${PR_NUMBER}"
          echo "Package: /orgs/${{ github.repository_owner }}/packages/container/${REPO_NAME}/versions"
          
          # Debug: show all available pr- tags
          echo "Available PR tags:"
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/orgs/${{ github.repository_owner }}/packages/container/${REPO_NAME}/versions" \
            --jq '.[] | .metadata.container.tags[] | select(startswith("pr-"))' 2>&1 | head -20 || echo "Failed to list tags"
          
          VERSION_ID=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/orgs/${{ github.repository_owner }}/packages/container/${REPO_NAME}/versions" \
            --jq ".[] | select(.metadata.container.tags[] == \"pr-${PR_NUMBER}\") | .id" \
            2>&1)
          
          echo "VERSION_ID result: '${VERSION_ID}'"
          
          if [ -n "$VERSION_ID" ] && [ "$VERSION_ID" != "null" ]; then
            echo "Deleting package version $VERSION_ID (tag: pr-${PR_NUMBER})"
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${{ github.repository_owner }}/packages/container/${REPO_NAME}/versions/$VERSION_ID"
          else
            echo "No package found with tag pr-${PR_NUMBER}, skipping cleanup"
          fi

  cleanup-auto:
    name: Delete QA GHCR image tag (auto)
    runs-on: ubuntu-latest
    if: >-
      (github.event.action == 'closed' && contains(github.event.pull_request.labels.*.name, 'PR: Ready for QA')) ||
      (github.event.action == 'unlabeled' && github.event.label.name == 'PR: Ready for QA')
    permissions:
      packages: write
    steps:
      - name: Delete PR tag from GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          VERSION_ID=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/orgs/${{ github.repository_owner }}/packages/container/${REPO_NAME}/versions" \
            --jq ".[] | select(.metadata.container.tags[] == \"pr-${PR_NUMBER}\") | .id" \
            2>/dev/null || true)
          
          if [ -n "$VERSION_ID" ]; then
            echo "Deleting package version $VERSION_ID (tag: pr-${PR_NUMBER})"
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              "/orgs/${{ github.repository_owner }}/packages/container/${REPO_NAME}/versions/$VERSION_ID"
          else
            echo "No package found with tag pr-${PR_NUMBER}, skipping cleanup"
          fi
