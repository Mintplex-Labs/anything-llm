# This GitHub action is for checking the versions of the packages in the project.
# Any package that is present in both the `server` and `collector` package.json file
# is checked to ensure that they are the same version.
name: Check package versions

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      packages_changed: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            packages:
              - 'server/package.json'
              - 'collector/package.json'

  verify-versions:
    needs: check-changes
    if: needs.check-changes.outputs.packages_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run verifyPackageVersions.mjs script
        run: |
          cd extras/scripts
          node verifyPackageVersions.mjs

  check-result:
    if: always()
    needs: [check-changes, verify-versions]
    runs-on: ubuntu-latest
    steps:
      - name: Determine result
        run: |
          if [ "${{ needs.verify-versions.result }}" == "failure" ]; then
            echo "Version check failed"
            exit 1
          fi
          echo "Check passed (or skipped - no package changes)"
